# Resume Matcher：前端（Nginx + 静态资源）反向代理 API 到后端，浏览器只需访问一个端口。
#
# 使用：
#   cp deploy/env.example .env
#   编辑 .env（至少填写 OPENAI_API_KEY）
#   docker compose up -d --build
#
# 默认前端 http://<服务器>:80 ，API 经同域 /resume/* 转发到容器 backend:3001 。

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?请在 .env 中设置 OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen-plus}
    expose:
      - "3001"
    networks:
      - resume-matcher

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        # 与 Nginx 同域反代时填 `/`，构建出的前端会请求 `/resume/analyze` 等
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_API_KEY: ${VITE_API_KEY:-}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - resume-matcher

networks:
  resume-matcher:
    driver: bridge
