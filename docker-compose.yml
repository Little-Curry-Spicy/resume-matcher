services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "3002"
    expose:
      - "3002"
    networks:
      - resume-matcher

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    env_file:
      - ./front/.env
    networks:
      - resume-matcher

networks:
  resume-matcher:
    driver: bridge
